<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Anish Goud</h1>
        <button onclick="toggleDarkMode()" id="darkBtn">
            Dark Mode
        </button>
        <nav>
            <a href="#about">About</a>
            <a href="#skills">Skills</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <main>
        <section id="about">
            <h2>About Me</h2>
            <img src="images/profile.jpg" 
            alt="Profile picture of Anish Goud">
            <p>Hi! My name is Anish Goud. I am a 
            beginner learning web development. I am 
            passionate about technology and enjoy 
            exploring how websites are built.</p>
            <button onclick="toggleAbout()" 
            id="aboutBtn">
                Hide About Me
            </button>
        </section>

        <section id="skills">
            <h2>My Skills</h2>
            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>Java Script</li>
            </ul>
        </section>

        <section id="contact">
            <h2>Contact Me</h2>
            <form onsubmit="return validateForm(event)">
                <input 
                    type="text" 
                    id="name"
                    placeholder="Your Name">
                <br><br>
                <input 
                    type="email" 
                    id="email"
                    placeholder="Your Email">
                <br><br>
                <textarea 
                    id="message" 
                    placeholder="Your Message">
                </textarea>
                <br><br>
                <div id="errorMsg" 
                style="color:red"></div>
                <div id="successMsg" 
                style="color:green"></div>
                <br>
                <button type="submit">Send</button>
            </form>
        </section>
    </main>

    <footer>
        <p>2026 Anish Goud</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
